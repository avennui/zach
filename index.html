<script>
  /* ═══════════════════════════════════════════════════════
       DATA CONFIGURATION
       ═══════════════════════════════════════════════════════ */
  const STATES = {

        { l: "Attention", v: 0.3 },
      ],
      hard: [
        { l: "Unemp. Bal", v: "CHECK" },

      ],

        speed: 0.15,

      metrics: [0.2, 0.25, 0.5],
      drivers: [
        { l: "Social Sync", v: 0.15 },

      ],
      hard: [
        { l: "Last Msg", v: "UNREAD" },

      ],
      physics: {
        radial: 0.3,
        speed: 0.05,
        noise: 0.02,
        radius: 38,    /* [6] reduced from 45 */
        alpha: 0.65,
      },
    },
  };

  const STATE_KEYS = Object.keys(STATES);
  let currentStateIndex = 0;
  let isDone = false;

  /* ═══════════════════════════════════════════════════════
       PARTICLE ENGINE
       ═══════════════════════════════════════════════════════ */
  const canvas = document.getElementById("sphereCanvas");
  const ctx = canvas.getContext("2d", { alpha: true });
  let particles = [];
  let curPhys = { ...STATES.Stable.physics };
  const DENSITY = 2400;

  function initParticles() {
    particles = [];
    for (let i = 0; i < DENSITY; i++) {
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(Math.random() * 2 - 1);
      const r = 90 + Math.random() * 20;
      particles.push({
        x: Math.sin(phi) * Math.cos(theta) * r,
        y: Math.sin(phi) * Math.sin(theta) * r,
        z: Math.cos(phi) * r,
        vx: 0,
        vy: 0,
        vz: 0,
        size: Math.random() * 0.5 + 0.15,
      });
    }
  }

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    ctx.scale(dpr, dpr);
  }

  /* [8] Set composite operation once at init, not per frame */
  function initCanvas() {
    resize();
    ctx.globalCompositeOperation = "lighter";
  }

  let time = 0;
  function animate() {
    time += 0.01;
    const state = STATES[STATE_KEYS[currentStateIndex]];
    const target = state.physics;

    // Coherence logic
    const targetRadius = isDone ? target.radius * 0.92 : target.radius;
    const targetNoise = isDone ? target.noise * 0.6 : target.noise;

    // Smooth lerp
    curPhys.radial += (target.radial - curPhys.radial) * 0.04;
    curPhys.speed += (target.speed - curPhys.speed) * 0.04;
    curPhys.noise += (targetNoise - curPhys.noise) * 0.04;
    curPhys.radius += (targetRadius - curPhys.radius) * 0.04;
    curPhys.alpha += (target.alpha - curPhys.alpha) * 0.04;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const cx = window.innerWidth / 2;
    /* [1] Use visualViewport for mobile toolbar resilience */
    const cy = (window.visualViewport?.height || window.innerHeight) * 0.32;

    const rotY = curPhys.speed * 0.012;
    const cosR = Math.cos(rotY);
    const sinR = Math.sin(rotY);

    for (let i = 0; i < particles.length; i++) {
      const pt = particles[i];

      // 3D Y-Axis Rotation
      const nx = pt.x * cosR - pt.z * sinR;
      const nz = pt.x * sinR + pt.z * cosR;
      pt.x = nx;
      pt.z = nz;

      // Cohesion Physics
      const d = Math.sqrt(pt.x * pt.x + pt.y * pt.y + pt.z * pt.z);
      const invD = 1 / (d || 1);
      const force = (d - curPhys.radius) * curPhys.radial;

      pt.vx -= pt.x * invD * force;
      pt.vy -= pt.y * invD * force;
      pt.vz -= pt.z * invD * force;
      pt.vx += (Math.random() - 0.5) * curPhys.noise;
      pt.vy += (Math.random() - 0.5) * curPhys.noise;
      pt.vz += (Math.random() - 0.5) * curPhys.noise;

      pt.vx *= 0.93;
      pt.vy *= 0.93;
      pt.vz *= 0.93;
      pt.x += pt.vx;
      pt.y += pt.vy;
      pt.z += pt.vz;

      // Projection
      const focalLength = 600;
      const scale = focalLength / (focalLength + pt.z);
      /* [7] Constant depth alpha — shimmer removed */
      const depthAlpha = 0.8 + ((focalLength - pt.z) / focalLength) * 0.2;
      const alpha = curPhys.alpha * depthAlpha;

      if (alpha > 0.035) {
        ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
        ctx.fillStyle = state.color;
        ctx.beginPath();
        ctx.arc(
          cx + pt.x * scale,
          cy + pt.y * scale,
          pt.size * scale,
          0,
          Math.PI * 2,
        );
        ctx.fill();
      }
    }

    requestAnimationFrame(animate);
  }

  /* ═══════════════════════════════════════════════════════
       UI LOGIC — PERSISTENT DOM
       ═══════════════════════════════════════════════════════ */

  /* [3][4] Shared renderer for all metric rows: label-value inline + bar */
  function renderMetricRow(container, label, displayValue, color, barWidth) {
    const row = document.createElement("div");
    row.className = "flex flex-col gap-2";
    row.innerHTML = `
      <div class="flex justify-between items-center">
        <span class="text-[10px] font-bold uppercase tracking-[0.16em]"
              style="color: ${color}; opacity: 0.35;">${label}</span>
        <span class="text-[10px] font-bold"
              style="color: ${color}; opacity: 0.85;">${displayValue}</span>
      </div>
      ${barWidth !== null ? `
      <div class="progress-bar-bg" style="background-color: ${color}1a;">
        <div class="progress-bar-fill" style="width: ${barWidth}%; background-color: ${color};"></div>
      </div>` : ''}
    `;
    container.appendChild(row);
  }

  function updateUI() {
    const state = STATES[STATE_KEYS[currentStateIndex]];

    // Basic text
    document.getElementById("stateLabel").innerText = state.label;
    document.getElementById("stateLabel").style.color = state.color;
    document.getElementById("actionTitle").innerText = state.action;
    document.getElementById("actionSub").innerText = state.sub;

    // Global color updates
    const colorElements = [
      document.getElementById("headerIcon"),
      document.getElementById("headerTitle"),
      document.getElementById("headerTimestamp"),
      document.getElementById("actionSub"),
    ];
    colorElements.forEach((el) => (el.style.color = state.color));

    // Action button and title Done state
    const doneBtn = document.getElementById("doneButton");
    const actionTitle = document.getElementById("actionTitle");

    if (isDone) {
      actionTitle.classList.add("line-through");
      actionTitle.style.opacity = "0.2";
      doneBtn.style.opacity = "0.3";
      doneBtn.querySelector("span").innerText = "Done";
    } else {
      actionTitle.classList.remove("line-through");
      actionTitle.style.opacity = "0.9";
      doneBtn.style.opacity = "1";
      doneBtn.querySelector("span").innerText = "Mark Done";
    }
    actionTitle.style.color = state.color;
    doneBtn.style.color = state.color;
    doneBtn.style.borderColor = state.color + "66";

    // Render Dots
    const dotsContainer = document.getElementById("indicatorContainer");
    dotsContainer.innerHTML = "";
    STATE_KEYS.forEach((key, i) => {
      const dot = document.createElement("div");
      dot.className = "dot rounded-none";
      dot.style.backgroundColor = state.color;
      dot.style.opacity = i === currentStateIndex ? "1" : "0.1";
      dot.style.transform =
        i === currentStateIndex ? "scale(1.5)" : "scale(1)";
      dotsContainer.appendChild(dot);
    });

    // [3] Render Signals — standardized layout
    const signalsContainer = document.getElementById("signalsContainer");
    signalsContainer.innerHTML = "";
    const labels = ["Cognitive Load", "Activation", "Stability"];
    state.metrics.forEach((m, i) => {
      renderMetricRow(signalsContainer, labels[i], Math.round(m * 100) + "%", state.color, m * 100);
    });

    // [3] Render Drivers — now matches System Signals layout
    const driversContainer = document.getElementById("driversContainer");
    driversContainer.innerHTML = "";
    state.drivers.forEach((d) => {
      renderMetricRow(driversContainer, d.l, Math.round(d.v * 100) + "%", state.color, d.v * 100);
    });

    // [3] Render Hard Signals — same label/value hierarchy, no bar
    const hardContainer = document.getElementById("hardSignalsContainer");
    hardContainer.innerHTML = "";
    state.hard.forEach((h) => {
      renderMetricRow(hardContainer, h.l, h.v, state.color, null);
    });
  }

  /* ═══════════════════════════════════════════════════════
       GESTURE HANDLING
       ═══════════════════════════════════════════════════════ */
  let touchStartX = 0;
  let touchStartY = 0; /* [2] Track vertical axis */
  const scrollContainer = document.getElementById("scrollContainer");

  scrollContainer.addEventListener(
    "touchstart",
    (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY; /* [2] */
    },
    { passive: true },
  );

  scrollContainer.addEventListener(
    "touchend",
    (e) => {
      const touchEndX = e.changedTouches[0].clientX;
      const touchEndY = e.changedTouches[0].clientY; /* [2] */
      const dx = touchStartX - touchEndX;
      const dy = touchStartY - touchEndY; /* [2] */

      /* [2] Only trigger when horizontal movement dominates */
      if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
        isDone = false;
        if (dx > 0) {
          currentStateIndex = (currentStateIndex + 1) % STATE_KEYS.length;
        } else {
          currentStateIndex =
            (currentStateIndex - 1 + STATE_KEYS.length) % STATE_KEYS.length;
        }
        updateUI();
      }
    },
    { passive: true },
  );

  document.getElementById("doneButton").addEventListener("click", () => {
    isDone = !isDone;
    updateUI();
  });

  // Initialize
  window.addEventListener("resize", () => {
    resize();
    /* [8] Re-set composite after resize resets canvas state */
    ctx.globalCompositeOperation = "lighter";
  });
  initCanvas();
  initParticles();
  updateUI();
  animate();
</script>
